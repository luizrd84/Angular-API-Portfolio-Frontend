
<div class="project_card">
    <!-- <img
        [src]="photoCover || 'https://via.placeholder.com/300'"
        (error)="photoCover = 'https://via.placeholder.com/300'"
        alt=""
    /> -->
    <!-- <img src="{{photoCover}}" alt=""> -->
    <img [src]="photoCover || ''" alt="">

    <div class="project_info">
        <p class="project_title">Nome do Projeto: {{cardTitle}}</p>
        
        @if (tecnologies.length > 0) {
            <ul class="tech_list">
                @for (tech of tecnologies; track tech; let last = $last) {
                    <li>
                        <img src="{{tech.url}}" alt="">
                        {{tech.name}}
                        <!-- se quiser o logo também, só usar -->
                    </li>
                }    
            </ul>
        }
    </div>

    <div class="butons">

        @if(routeDetails !== "") {
            <button class="details_btn" [routerLink]="routeDetails">Detalhar</button>
        }
        @else {
            <button class="details_btn">Detalhar</button>
        }
        
        
        @if(isAdmin) {
            @if(routeEdit !== "") {
                <button class="details_btn" [routerLink]="routeEdit">Editar</button>
            }
            @else {
                <button class="details_btn">Editar</button>
            }
            <!-- <button class="details_btn" (click)="onEdit()">Editar</button> -->
            <button class="details_btn" (click)="onDelete()">Deletar</button>
        }
    </div>
</div>
