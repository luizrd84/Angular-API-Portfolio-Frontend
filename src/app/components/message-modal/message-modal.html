
@if(isVisible) {
  <div class="modal-backdrop" (click)="closeModal()"></div>

  <div class="modal">
    <div class="modal-header">
      <h2>{{ title }}</h2>
    </div>
    <div class="modal-body">
      <p>{{ message }}</p>
    </div>
    <div class="modal-footer">
      <button (click)="closeModal()">{{ buttonText }}</button>
    </div>
  </div>
}
